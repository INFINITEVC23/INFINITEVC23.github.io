<!DOCTYPE html>
<html>
<head>
    <title>NX-STRIKE | Ghost Shield V7 (CLEAN)</title>
    <style>
        body { background: #020202; color: #00ff00; font-family: 'Consolas', monospace; padding: 30px; text-align: center; }
        .container { max-width: 850px; margin: auto; background: #050505; border: 1px solid #00ff00; padding: 25px; border-radius: 2px; box-shadow: 0 0 30px rgba(0, 255, 0, 0.1); }
        textarea { width: 100%; height: 200px; background: #000; color: #00ff00; border: 1px solid #00ff0044; padding: 15px; font-size: 11px; outline: none; margin-bottom: 20px; box-sizing: border-box; }
        .btn { background: #00ff00; color: #000; border: none; padding: 18px; width: 100%; font-weight: 900; cursor: pointer; letter-spacing: 5px; transition: 0.3s; margin-bottom: 10px; }
        .btn:hover { background: #fff; box-shadow: 0 0 20px #00ff00; }
        .copy-btn { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 10px; width: 100%; font-size: 10px; letter-spacing: 2px; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: #00ff00; color: #000; }
        .status { font-size: 10px; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="letter-spacing: 10px; margin-bottom: 5px;">NX-STRIKE V7</h1>
    <p style="color:#00ff00; font-size:10px; margin-bottom: 25px; opacity: 0.6;">PURE ENCRYPTION | NO ANTI-TAMPER | CLEAN VM</p>
    
    <textarea id="input" placeholder="[ PASTE RAW SOURCE CODE HERE ]"></textarea>
    
    <button class="btn" onclick="strike()">STRIKE & PROTECT</button>
    
    <div style="margin-top: 25px;">
        <label style="display:block; font-size:10px; color:#666; margin-bottom:5px;">ENCRYPTED OUTPUT</label>
        <textarea id="output" readonly placeholder="[ SECURED OUTPUT WILL APPEAR HERE ]"></textarea>
        <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">COPY OUTPUT TO CLIPBOARD</button>
    </div>
    
    <p class="status" id="statusLabel">SYSTEM READY</p>
</div>

<script>
function strike() {
    const src = document.getElementById('input').value;
    if(!src) { alert("Input required."); return; }

    // --- ENCRYPTION KEYS ---
    const key = Math.floor(Math.random() * 200) + 20;
    const shift = Math.floor(Math.random() * 50) + 5;

    let bytes = [];
    for (let i = 0; i < src.length; i++) {
        let b = src.charCodeAt(i);
        // Scramble the byte using math
        bytes.push(b + shift ^ key);
    }

    // --- CLEAN LOADER (NO SECURITY CHECKS) ---
    const loader = `--[[ NX-STRIKE CLEAN LOADER ]]
local _k, _s = ${key}, ${shift}
local _d = {${bytes.join(',')}}
local _r = {}

local function _x(a, b)
    local r, p = 0, 1
    while a > 0 or b > 0 do
        local ra, rb = a % 2, b % 2
        if ra ~= rb then r = r + p end
        a, b, p = math.floor(a / 2), math.floor(b / 2), p * 2
    end
    return r
end

for i = 1, #_d do
    _r[i] = string.char(_x(_d[i], _k) - _s)
end

local _vm, _err = loadstring(table.concat(_r))
if _vm then
    _vm()
else
    warn("[NX-STRIKE ERROR]: " .. tostring(_err))
end`;

    document.getElementById('output').value = loader;
    document.getElementById('statusLabel').innerText = "SUCCESS: CLEAN ENCRYPTION COMPLETE";
}

function copyToClipboard() {
    const output = document.getElementById('output');
    const btn = document.getElementById('copyBtn');
    if (!output.value) return;
    output.select();
    navigator.clipboard.writeText(output.value).then(() => {
        btn.innerText = "COPIED!";
        setTimeout(() => { btn.innerText = "COPY OUTPUT TO CLIPBOARD"; }, 2000);
    });
}
</script>

</body>
</html>
