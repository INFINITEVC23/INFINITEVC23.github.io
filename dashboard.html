<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NX-STRIKE | Developer Portal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #7c3aed;
            --bg: #09090b;
            --card: rgba(24, 24, 27, 0.8);
            --border: rgba(63, 63, 70, 0.5);
            --text: #fafafa;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: radial-gradient(circle at top left, #1e1b4b, #09090b);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .glass-panel {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .header h1 { font-size: 1.5rem; margin: 0; background: linear-gradient(to right, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border-radius: 99px;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        textarea {
            width: 100%;
            height: 350px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #a1a1aa;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus { border-color: var(--primary); }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-top: 1.5rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .info-card {
            margin-top: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #71717a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .glass-panel { padding: 1.2rem; }
            textarea { height: 250px; }
            .controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="header">
            <i data-lucide="shield-check" style="color: #7c3aed;"></i>
            <h1>NX-STRIKE</h1>
            <span class="status-badge">System Live</span>
        </div>

        <textarea id="codeArea" placeholder="Paste your obfuscated Luau script here..."></textarea>

        <div class="controls">
            <div id="statusText" style="display: flex; align-items: center; font-size: 0.9rem; color: #a1a1aa;">
                Ready to push update
            </div>
            <button onclick="publishScript()">
                <i data-lucide="cloud-upload" size="18"></i>
                Publish to Cloud
            </button>
        </div>

        <div class="info-card">
            <i data-lucide="info" size="16"></i>
            Updates are instantly pushed to your Cloudflare Worker and applied to all HWID-locked users.
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Replace this with your actual Worker URL
        const WORKER_URL = "https://nx-bridge.noahthagoat20.workers.dev/update"; 

        async function publishScript() {
            const code = document.getElementById('codeArea').value;
            const btn = document.querySelector('button');
            const status = document.getElementById('statusText');

            if (!code) return alert("Please paste some code first!");

            btn.disabled = true;
            status.innerText = "Connecting...";

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });

                if (response.ok) {
                    status.style.color = "#4ade80";
                    status.innerText = "Successfully Deployed!";
                    setTimeout(() => { 
                        status.innerText = "Ready to push update"; 
                        status.style.color = "#a1a1aa";
                    }, 3000);
                } else {
                    throw new Error("Update failed");
                }
            } catch (err) {
                status.style.color = "#ef4444";
                status.innerText = "Error: Check Worker URL";
            } finally {
                btn.disabled = false;
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
